<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Castiel Zhang — Software Developer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav>
    <span class="nav-logo">CZ.DEV</span>
    <ul class="nav-links" id="nav-links"></ul>
</nav>

<section id="home"></section>

<div id="sections-container"></div>

<footer>
    <span>© 2025 Castiel Zhang · Built with HTML/CSS/JS · Hosted on GitHub Pages</span>
</footer>

<script>
const esc = s => String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

// ── Nav ──────────────────────────────────────────────────────────────────────

function renderNav(sections) {
    document.getElementById('nav-links').innerHTML = sections
        .map(s => `<li><a href="#${s.id}">${esc(s.nav)}</a></li>`)
        .join('');
}

// ── Hero ─────────────────────────────────────────────────────────────────────

function renderHero(data) {
    document.getElementById('home').innerHTML = `
        <p class="hero-eyebrow fade-in">// ${esc(data.eyebrow)}</p>
        <h1 class="hero-name fade-in">${esc(data.name.first)} <span>${esc(data.name.last)}</span></h1>
        <p class="hero-title fade-in">${esc(data.title)}</p>
        <div class="hero-bottom fade-in">
            <p class="hero-desc">${esc(data.description)}</p>
            <a class="hero-cta" href="#experience">View Experience →</a>
        </div>`;
}

// ── Section wrapper ───────────────────────────────────────────────────────────

function sectionHtml(section, index, inner) {
    const num = String(index).padStart(2, '0');
    return `
<section id="${section.id}">
    <p class="section-label fade-in">// ${num}. ${esc(section.nav.toUpperCase())}</p>
    <h2 class="section-title fade-in">${esc(section.title)}</h2>
    ${inner}
</section>`;
}

// ── Section renderers ─────────────────────────────────────────────────────────

function renderAbout(data) {
    const paras = data.paragraphs.map(p => `<p>${p}</p>`).join('');
    const stats = data.stats.map(s => `
        <div class="stat-cell">
            <div class="stat-num">${esc(s.value)}</div>
            <div class="stat-label">${esc(s.label)}</div>
        </div>`).join('');
    return `
    <div class="about-grid fade-in">
        <div class="about-text">${paras}</div>
        <div class="about-stats">${stats}</div>
    </div>`;
}

const SKILL_COLORS = { blue: '#63caff', orange: '#fb923c', purple: '#a78bfa', green: '#34d399' };

function renderSkills(data) {
    const groups = data.groups.map(g => {
        const color = SKILL_COLORS[g.color] || SKILL_COLORS.purple;
        return `
        <div class="skill-group" style="--skill-color: ${color}">
            <p class="skill-group-title">${esc(g.title)}</p>
            <ul class="skill-list">${g.items.map(i => `<li>${esc(i)}</li>`).join('')}</ul>
        </div>`;
    }).join('');
    return `<div class="skills-grid fade-in">${groups}</div>`;
}

const MONTH_NUM = { Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12 };

function formatDate(date) {
    if (!date) return '';
    const fmt = d => d.month ? `${d.month} ${d.year}` : `${d.year}`;
    const end  = date.end ? fmt(date.end) : 'Present';
    return `${fmt(date.start)} — ${end}`;
}

function calcDuration(start, end) {
    const s = new Date(start.year, (MONTH_NUM[start.month] || 1) - 1);
    const e = end ? new Date(end.year, (MONTH_NUM[end.month] || 1) - 1) : new Date();
    const months = (e.getFullYear() - s.getFullYear()) * 12 + (e.getMonth() - s.getMonth());
    const yrs = Math.floor(months / 12);
    const mos = months % 12;
    const parts = [];
    if (yrs) parts.push(`${yrs} yr${yrs !== 1 ? 's' : ''}`);
    if (mos) parts.push(`${mos} mo${mos !== 1 ? 's' : ''}`);
    return parts.join(' ') || '< 1 mo';
}

function formatTenure(tenure) {
    if (typeof tenure === 'string') return tenure;
    const range    = formatDate({ start: tenure.start, end: tenure.end });
    const duration = calcDuration(tenure.start, tenure.end);
    return `${range} · ${duration} · ${tenure.location}`;
}

function timelineItemHtml(item, showSummary) {
    const tags = item.tags.map(t =>
        `<span class="tag tag-${t.color}">${esc(t.text)}</span>`).join('');
    const bullets = item.bullets.map(b => `<li>${esc(b)}</li>`).join('');
    const roleParts = item.name ? [item.role, item.type, item.location].filter(Boolean) : [];
    return `
    <div class="timeline-item fade-in">
        <div class="timeline-date">${esc(typeof item.date === 'object' ? formatDate(item.date) : item.date)}</div>
        <div class="timeline-content">
            <p class="exp-role">${esc(item.name || item.role)}</p>
            ${roleParts.length ? `<p class="exp-role-sub">${roleParts.map(esc).join(' · ')}</p>` : ''}
            ${showSummary && item.summary ? `<p class="exp-summary">${esc(item.summary)}</p>` : ''}
            ${tags    ? `<div class="exp-tags">${tags}</div>`      : ''}
            ${bullets ? `<ul class="exp-bullets">${bullets}</ul>`  : ''}
        </div>
    </div>`;
}

function renderExperience(data) {
    const sorted = [...data.items].sort((a, b) => {
        if (b.date.start.year !== a.date.start.year) return b.date.start.year - a.date.start.year;
        return (MONTH_NUM[b.date.start.month] || 0) - (MONTH_NUM[a.date.start.month] || 0);
    });
    const items = sorted.map(i => timelineItemHtml(i, true)).join('');
    const logo  = data.company.logo
        ? `<img class="company-logo" src="${data.company.logo}" alt="${esc(data.company.name)} logo">`
        : '';
    return `
    <div class="company-header fade-in">
        <span class="company-name">${logo}${esc(data.company.name)}</span>
        <span class="company-tenure">${esc(formatTenure(data.company.tenure))}</span>
    </div>
    <div class="timeline">${items}</div>`;
}

function renderEducation(data) {
    const items = data.items.map(i => timelineItemHtml(i, false)).join('');
    return `
    <div class="company-header fade-in">
        <span class="company-name">${esc(data.institution.name)}</span>
        <span class="company-tenure">${esc(data.institution.tenure)}</span>
    </div>
    <div class="timeline">${items}</div>`;
}

function renderContact(data) {
    const links = data.links.map(l => `
        <a class="contact-link" href="${l.href}" target="_blank">
            ${l.qr ? `<img class="contact-link-qr" src="${l.qr}" alt="${esc(l.label)} QR">` : ''}
            <span class="contact-link-label">↗ ${esc(l.label)}</span>
        </a>`).join('');
    return `
    <div class="contact-inner fade-in">
        <p class="contact-desc">${esc(data.description)}</p>
        <div class="contact-links">${links}</div>
    </div>`;
}

const RENDERERS = { about: renderAbout, skills: renderSkills, experience: renderExperience, education: renderEducation, contact: renderContact };

// ── Fade-in observer ──────────────────────────────────────────────────────────

function setupFadeIn() {
    const obs = new IntersectionObserver(entries => {
        entries.forEach(e => {
            if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
        });
    }, { threshold: 0.1 });
    document.querySelectorAll('.fade-in').forEach(el => obs.observe(el));
}

// ── Init ──────────────────────────────────────────────────────────────────────

async function init() {
    const [manager, hero] = await Promise.all([
        fetch('content/manager.json').then(r => r.json()),
        fetch('content/hero.json').then(r => r.json()),
    ]);

    renderNav(manager.sections);
    renderHero(hero);

    const container = document.getElementById('sections-container');
    for (const [i, section] of manager.sections.entries()) {
        const data     = await fetch('content/' + section.file).then(r => r.json());
        const renderer = RENDERERS[section.id];
        if (!renderer) continue;
        container.insertAdjacentHTML('beforeend', sectionHtml(section, i + 1, renderer(data)));
    }

    setupFadeIn();
}

init();
</script>

</body>
</html>
